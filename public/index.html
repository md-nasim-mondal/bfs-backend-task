<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Web Demo Client</title>
    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background: #f5f5f5; }
        h2 { color: #075e54; }
        #qr-container { margin: 20px auto; min-height: 250px; }
        #status { font-weight: bold; margin-top: 10px; color: #333; font-size: 1.1em; }
        .success { color: #25d366 !important; }
        .error { color: #e74c3c !important; }
        .waiting { color: #f39c12 !important; }
        #logout-btn {
            display: none;
            margin: 20px auto;
            padding: 12px 30px;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1em;
            cursor: pointer;
        }
        #logout-btn:hover { background: #c0392b; }
    </style>
</head>
<body>
    <h2>WhatsApp Backend - QR Authentication Demo</h2>
    <div id="status" class="waiting">Connecting to server...</div>
    <div id="qr-container">
        <img id="qr-image" style="display: none; margin: 0 auto; border: 2px solid #ccc; border-radius: 8px;" alt="QR Code" />
    </div>
    <button id="logout-btn" onclick="doLogout()">Logout WhatsApp Session</button>
    
    <script>
        const socket = io('http://localhost:5000');
        const statusDiv = document.getElementById('status');
        const qrImage = document.getElementById('qr-image');
        const logoutBtn = document.getElementById('logout-btn');

        function showReady() {
            statusDiv.textContent = '✅ WhatsApp Client is READY! You can now send API requests.';
            statusDiv.className = 'success';
            qrImage.style.display = 'none';
            logoutBtn.style.display = 'inline-block';
        }

        function showDisconnected() {
            statusDiv.textContent = '❌ WhatsApp Client Disconnected!';
            statusDiv.className = 'error';
            qrImage.style.display = 'none';
            logoutBtn.style.display = 'none';
        }

        socket.on('connect', () => {
            statusDiv.textContent = 'Connected to server. Waiting for QR Code...';
            statusDiv.className = 'waiting';
        });

        socket.on('qr', (data) => {
            statusDiv.textContent = '📱 Scan the QR Code with your WhatsApp app!';
            statusDiv.className = 'waiting';
            qrImage.src = data;
            qrImage.style.display = 'block';
            logoutBtn.style.display = 'none';
        });

        socket.on('ready', () => {
            showReady();
        });

        socket.on('authenticated', () => {
            statusDiv.textContent = '🔐 Authentication Successful! Preparing client...';
            statusDiv.className = 'success';
            qrImage.style.display = 'none';
        });

        socket.on('auth_failure', (msg) => {
            statusDiv.textContent = '❌ Authentication Failed: ' + msg.message;
            statusDiv.className = 'error';
        });

        socket.on('disconnected', () => {
            showDisconnected();
        });

        async function doLogout() {
            logoutBtn.disabled = true;
            logoutBtn.textContent = 'Logging out...';
            try {
                const res = await fetch('http://localhost:5000/api/v1/messages/logout', { method: 'POST' });
                const data = await res.json();
                if (data.success) {
                    showDisconnected();
                    statusDiv.textContent = '🔓 Logged out successfully. Restart server to re-authenticate.';
                } else {
                    statusDiv.textContent = '⚠️ ' + data.message;
                    statusDiv.className = 'error';
                }
            } catch (err) {
                statusDiv.textContent = '⚠️ Failed to logout: ' + err.message;
                statusDiv.className = 'error';
            }
            logoutBtn.disabled = false;
            logoutBtn.textContent = 'Logout WhatsApp Session';
        }
    </script>
</body>
</html>
